{% with messages = get_flashed_messages(with_categories=true) %} {% if messages
%}
<ul class="mb-4 flashes">
  {% for category, message in messages %}
  <li
    class="p-2 rounded {% if category == 'success' %} bg-green-100 text-green-700 {% elif category == 'error' %} bg-red-100 text-red-700 {% else %} bg-gray-100 text-gray-700 {% endif %}"
  >
    {{ message }}
  </li>
  {% endfor %}
</ul>
{% endif %} {% endwith %}
