<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="{{url_for('static', filename='/images/skills.svg')}}"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TeachAnything | Knowledge is power. Either way.</title>
    <script src="https://unpkg.com/htmx.org@1.9.2"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        /* background-image: linear-gradient(to right, #ff7e5f, #feb47b);
        height: 96vh; */
        background: #80947d;
        background: linear-gradient(0deg, #329424, #b7d6b7);
        height: 90vh;
      }
      .flash.error {
        color: red;
      }
      .flash.success {
        color: green;
      }
      .flash.info {
        color: teal;
      }
      .flashes {
        position: fixed; /* or absolute, depending on your layout */
        top: 20px; /* adjust as needed */
        right: 20px; /* adjust as needed */
        background-color: #f8d7da; /* example background color */
        color: #302f2f; /* example text color */
        padding: 15px;
        border: 1px solid #f5c6cb;
        border-radius: 5px;
        z-index: 1000; /* ensure it appears above other content */
      }

      .carousel {
        max-width: 350px;
        display: flex;
        align-items: center;
        margin: 0 auto;
        overflow-x: auto; /* Enables horizontal scrolling */
        scroll-snap-type: x mandatory; /* Enables snap scrolling */
      }

      .card {
        flex: 0 0 auto; /* Prevents cards from shrinking */
        width: 350px; /* Set a fixed width for each card */
        margin-right: 10px; /* Space between cards */
        position: relative; /* For positioning text */
        scroll-snap-align: start; /* Aligns cards to the start */
      }

      .card img {
        width: 100%; /* Makes image fill the card */
        height: auto; /* Maintains aspect ratio */
      }

      .text {
        position: absolute; /* Positions text over the image */
        bottom: 10px; /* Adjusts vertical position */
        left: 10px; /* Adjusts horizontal position */
        color: white; /* Text color */
        background-color: rgba(0, 0, 0, 0.5); /* Semi-transparent background */
        padding: 5px; /* Adds padding around text */
      }
    </style>
  </head>
  <body class="bg-gray-100 h-screen">
    {% include 'hero.html' %} {% include 'features.html' %} {% include
    'onboarding.html' %}

    <h2 class="p-6 text-base text-center font-semibold leading-7 text-white">
      Get started now
    </h2>
    <p
      class="text-center text-4xl font-bold tracking-tight text-yellow-200 sm:text-5xl"
    >
      Sign up to start teaching.
    </p>
    <div
      class="bg-white p-4 m-4 rounded shadow-md w-96 flex justify-center items-center"
      id="started"
      style="margin: 2% auto"
    >
      <form
        hx-post="/register"
        hx-target="#modal-container"
        hx-swap="innerHTML"
        class="space-y-2"
      >
        <input
          type="text"
          name="username"
          placeholder="Username"
          class="w-full border p-2 rounded"
          required
        />
        <input
          type="email"
          name="email"
          placeholder="Email"
          class="w-full border p-2 rounded"
          required
        />
        <input
          type="password"
          name="password"
          placeholder="Password"
          class="w-full border p-2 rounded"
          required
        />
        <textarea
          name="bio"
          rows="3"
          placeholder="Short description of you or your specialty"
          class="w-full border p-2 rounded"
        ></textarea>
        <button
          type="submit"
          class="bg-green-500 text-white px-4 py-2 rounded hover:bg-white hover:text-black transition-colors"
        >
          Get started for free</button
        ><br />
        <span class="htmx-indicator ml-2 text-sm text-orange-800"
          >⏳ Generating your web links...</span
        >
      </form>

      <!-- Empty container for modal -->
      <div id="modal-container"></div>
    </div>
    {% include 'stickybar.html' %}
  </body>
</html>
